# Project-wide Gradle settings.
# Specifies the JVM arguments used for the daemon process.
# This combined line fixes the "IllegalAccessError" for Java 17+ and Kapt.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 --add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# Enables AndroidX and Jetifier
android.useAndroidX=true
android.enableJetifier=true

# Improves Kapt performance and compatibility
kapt.use.worker.api=true